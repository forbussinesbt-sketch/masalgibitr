<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masal Gibi | Yıldızlar</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --font-serif: 'Playfair Display', Georgia, serif;
      --font-body: 'Cormorant Garamond', Georgia, serif;
    }

    body, html {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: var(--font-body);
    }

    #star-field {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    .sky {
      position: relative;
      width: 100vw;
      height: 100vh;
      z-index: 10;
    }

    /* HEADER */
    .header {
      position: fixed;
      top: 0;
      width: 100%;
      height: 64px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      z-index: 200;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .logo-text {
      font-family: var(--font-serif);
      font-size: 22px;
      font-weight: 700;
      font-style: italic;
      color: #ffffff;
      text-decoration: none;
      letter-spacing: 1px;
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-link {
      font-family: var(--font-body);
      font-style: italic;
      font-size: 1rem;
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      padding: 6px 14px;
      border-radius: 20px;
      letter-spacing: 0.5px;
      transition: color 0.3s, background 0.3s;
      white-space: nowrap;
    }

    .nav-link:hover {
      color: #ffffff;
      background: rgba(255,255,255,0.08);
    }

    .nav-link.active {
      color: #ffffff;
      background: rgba(255,255,255,0.08);
    }

    .nav-divider {
      width: 1px;
      height: 16px;
      background: rgba(255,255,255,0.15);
      margin: 0 4px;
    }

    /* CELESTIAL */
    .celestial {
      position: absolute;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: opacity 0.5s ease;
    }

    .celestial svg {
      display: block;
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    @keyframes activeGlow {
      0%, 100% { filter: drop-shadow(0 0 4px #fff); transform: scale(1); }
      50%       { filter: drop-shadow(0 0 12px #fff) drop-shadow(0 0 20px #fff); transform: scale(1.08); }
    }

    .active-star {
      cursor: pointer;
      animation: activeGlow 4s infinite ease-in-out;
    }
    .active-star svg { fill: #ffffff; }

    .dim-star {
      cursor: default;
      opacity: 0.45;
    }
    .dim-star svg { fill: #3a3a3a; stroke: #555; stroke-width: 1.5px; }

    .name-tag {
      margin-top: 8px;
      font-family: var(--font-body);
      font-style: italic;
      font-size: 11px;
      letter-spacing: 1.5px;
      color: rgba(255,255,255,0.55);
      white-space: nowrap;
      text-align: center;
      pointer-events: none;
      transition: color 0.3s;
    }

    .active-star .name-tag { color: rgba(255,255,255,0.75); }
    .active-star:hover .name-tag { color: rgba(255,255,255,1); }

    /* PRENS */
    #prens {
      position: absolute;
      transform: translateX(-50%);
      z-index: 50;
      opacity: 0.85;
      width: 130px;
      pointer-events: none;
    }

    /* OVERLAY */
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      backdrop-filter: blur(18px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }

    #overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .modal-content {
      max-width: 560px;
      width: 90%;
      text-align: center;
      color: #fff;
      padding: 20px;
    }

    .modal-star-placeholder {
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }

    #modal-name {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 400;
      letter-spacing: 3px;
      margin-bottom: 16px;
      color: #fff;
    }

    #modal-note {
      font-family: var(--font-body);
      font-style: italic;
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      color: rgba(255,255,255,0.65);
      line-height: 1.8;
      margin-bottom: 40px;
    }

    .close-btn {
      background: transparent;
      color: rgba(255,255,255,0.5);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 10px 36px;
      cursor: pointer;
      font-family: var(--font-body);
      font-style: italic;
      font-size: 0.95rem;
      letter-spacing: 2px;
      transition: all 0.3s;
    }

    .close-btn:hover {
      color: #fff;
      border-color: rgba(255,255,255,0.6);
    }

    #clone-layer {
      position: fixed;
      inset: 0;
      z-index: 1100;
      pointer-events: none;
    }

    @media (max-width: 600px) {
      .header { padding: 0 16px; }
      .logo-text { font-size: 19px; }
      .nav-link { font-size: 0.9rem; padding: 5px 10px; }
    }
  </style>
</head>
<body>

<canvas id="star-field"></canvas>

<header class="header">
  <a href="index.html" class="logo-text">Masal Gibi</a>
<nav class="nav">
  <a href="bucket.html" class="nav-link">100 Şey</a>
  <div class="nav-divider"></div>
  <a href="stories.html" class="nav-link">Masallar</a>
  <div class="nav-divider"></div>
  <a href="stars.html" class="nav-link">Yıldızlar</a>
</nav>
</header>

<div class="sky" id="sky"></div>

<div id="overlay">
  <div class="modal-content">
    <div class="modal-star-placeholder"></div>
    <div id="modal-name"></div>
    <p id="modal-note"></p>
    <button class="close-btn" onclick="closeOverlay()">Gökyüzüne dön</button>
  </div>
</div>

<div id="clone-layer"></div>

<script src="data/stars.js"></script>
<script src="js/nav.js"></script>
<script>
  const SHAPES = {
    star4: { vb: "0 0 100 100", d: "M50 0 L55 45 L100 50 L55 55 L50 100 L45 55 L0 50 L45 45 Z" },
    star5: { vb: "0 0 24 24",   d: "M12 2l2.4 7.2h7.6l-6.1 4.4 2.3 7.2-6.2-4.5-6.2 4.5 2.3-7.2-6.1-4.4h7.6z" },
    moon:  { vb: "0 0 24 24",   d: "M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9c.83 0 1.61-.12 2.35-.33-1.44-1.21-2.35-3.01-2.35-5.02 0-3.62 2.94-6.55 6.55-6.55.22 0 .43.01.65.04C18.06 5.92 15.26 3 12 3z" }
  };

  const canvas = document.getElementById("star-field");
  const ctx    = canvas.getContext("2d");
  let cw, ch;

  const bgStars = Array.from({ length: 350 }, () => ({
    x:     Math.random() * 100,
    y:     Math.random() * 100,
    s:     Math.random() * 1.4 + 0.2,
    o:     Math.random() * 0.7 + 0.1,
    speed: Math.random() * 0.003 + 0.001
  }));

  function resizeCanvas() {
    cw = canvas.width  = window.innerWidth;
    ch = canvas.height = window.innerHeight;
  }

  function drawCanvas() {
    ctx.clearRect(0, 0, cw, ch);
    bgStars.forEach(s => {
      s.o += Math.sin(Date.now() * s.speed) * 0.002;
      ctx.fillStyle = `rgba(255,255,255,${Math.max(0.05, Math.min(0.9, s.o))})`;
      ctx.beginPath();
      ctx.arc(s.x * cw / 100, s.y * ch / 100, s.s, 0, Math.PI * 2);
      ctx.fill();
    });
    requestAnimationFrame(drawCanvas);
  }

  window.addEventListener("resize", resizeCanvas);
  resizeCanvas();
  drawCanvas();

  const sky = document.getElementById("sky");

  if (STARS_DATA.prens) {
    const img = document.createElement("img");
    img.id  = "prens";
    img.src = STARS_DATA.prens.src;
    Object.assign(img.style, STARS_DATA.prens.pos);
    sky.appendChild(img);
  }

  function createCelestial(data, pos) {
    const el = document.createElement("div");
    el.className = "celestial " + (data.active ? "active-star" : "dim-star");
    el.id = data.id;

    Object.assign(el.style, {
      width:  data.size + "px",
      height: data.size + "px",
      ...pos
    });

    const shape = SHAPES[data.shape] || SHAPES.star5;
    el.innerHTML = `
      <svg viewBox="${shape.vb}"><path d="${shape.d}"/></svg>
      <div class="name-tag">${data.name}</div>
    `;

    if (data.active) {
      el.addEventListener("click", () => openOverlay(data, el));
    }

    return el;
  }

  STARS_DATA.main.forEach(star => {
    sky.appendChild(createCelestial(star, star.pos));
  });

  function gridPositions(count) {
    const cols  = Math.ceil(Math.sqrt(count * 2));
    const rows  = Math.ceil(count / cols);
    const cellW = 80 / cols;
    const cellH = 25 / rows;
    const positions = [];

    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        if (positions.length >= count) break;
        const baseLeft = 10 + c * cellW;
        const baseTop  = 65 + r * cellH;
        const jitterX  = (Math.random() - 0.5) * cellW * 0.35;
        const jitterY  = (Math.random() - 0.5) * cellH * 0.35;
        positions.push({
          left: Math.min(Math.max(baseLeft + jitterX, 5), 92) + "vw",
          top:  Math.min(Math.max(baseTop  + jitterY, 63), 93) + "vh"
        });
      }
    }
    return positions;
  }

  const friendPositions = gridPositions(STARS_DATA.friends.length);
  STARS_DATA.friends.forEach((star, idx) => {
    sky.appendChild(createCelestial(star, friendPositions[idx]));
  });

  let activeClone = null;
  let originEl    = null;
  let originPos   = {};

  function openOverlay(data, el) {
    originEl = el;
    const rect = el.getBoundingClientRect();
    originPos = { top: rect.top, left: rect.left };

    const clone = el.cloneNode(true);
    Object.assign(clone.style, {
      position:   "fixed",
      top:        rect.top    + "px",
      left:       rect.left   + "px",
      width:      rect.width  + "px",
      height:     rect.height + "px",
      transition: "none"
    });
    clone.querySelector(".name-tag").style.display = "none";
    document.getElementById("clone-layer").appendChild(clone);
    activeClone = clone;
    el.style.opacity = "0";

    document.getElementById("modal-name").textContent = data.name;
    document.getElementById("modal-note").textContent = data.note || "Işığıyla eşlik ediyor.";
    document.getElementById("overlay").classList.add("active");

    requestAnimationFrame(() => {
      clone.style.transition = "all 0.9s cubic-bezier(0.19, 1, 0.22, 1)";
      clone.style.top        = "30%";
      clone.style.left       = "50%";
      clone.style.transform  = "translate(-50%, -50%) scale(3)";
    });
  }

  function closeOverlay() {
    document.getElementById("overlay").classList.remove("active");
    if (activeClone) {
      activeClone.style.transition = "all 0.7s cubic-bezier(0.19, 1, 0.22, 1)";
      activeClone.style.top        = originPos.top  + "px";
      activeClone.style.left       = originPos.left + "px";
      activeClone.style.transform  = "translate(0,0) scale(1)";
      setTimeout(() => {
        if (originEl) originEl.style.opacity = "1";
        activeClone.remove();
        activeClone = null;
        originEl    = null;
      }, 700);
    }
  }

  document.getElementById("overlay").addEventListener("click", function(e) {
    if (e.target === this) closeOverlay();
  });
</script>

</body>
</html>
